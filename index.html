<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Hannon — Practice Sheet</title>
  <meta name="description" content="A simple Hanon practice sheet: tap to switch between scales, arpeggios and exercises, each shown large and at random. Optimised for landscape." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="viewer" class="viewer">
    <div id="sheet" class="sheet" aria-live="polite"></div>
  </div>

  <div id="controls" class="controls">
    <button id="modeBtn" class="ctl mode" aria-label="Switch practice (tap to cycle)" title="Switch: Scales → Arpeggios → Exercises">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7h13l-3-3M21 17H8l3 3"/>
      </svg>
      <span id="modeName">Scales</span>
    </button>
    <button id="shuffleBtn" class="ctl dice" aria-label="Random sheet" title="Random (Space). Swipe ↑/↓ for prev / next">
      <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="5" />
        <circle cx="8.5" cy="8.5" r="1.35" fill="currentColor" stroke="none" />
        <circle cx="15.5" cy="8.5" r="1.35" fill="currentColor" stroke="none" />
        <circle cx="12" cy="12" r="1.35" fill="currentColor" stroke="none" />
        <circle cx="8.5" cy="15.5" r="1.35" fill="currentColor" stroke="none" />
        <circle cx="15.5" cy="15.5" r="1.35" fill="currentColor" stroke="none" />
      </svg>
    </button>
    <button id="selfBtn" class="ctl dice" aria-label="Upload or replace PDF" title="Upload / replace your PDF" style="display:none">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 16V4M12 4 8 8M12 4l4 4" />
        <path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4" />
      </svg>
    </button>
  </div>

  <input id="pdfInput" type="file" accept="application/pdf,.pdf" hidden />

  <script src="app.js"></script>
</body>
</html>
