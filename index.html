<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Hannon — Practice Sheet</title>
  <meta name="description" content="A simple Hanon practice sheet: tap to switch between scales, arpeggios and exercises, each shown large and at random. Optimised for landscape." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="viewer" class="viewer">
    <div id="sheet" class="sheet" aria-live="polite"></div>
  </div>

  <div id="controls" class="controls">
    <button id="modeBtn" class="ctl mode" aria-label="Switch practice (tap to cycle)" title="Switch: Scales → Arpeggios → Exercises">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7h13l-3-3M21 17H8l3 3"/>
      </svg>
      <span id="modeName">Scales</span>
    </button>
    <button id="shuffleBtn" class="ctl" aria-label="Another at random" title="Another, at random">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
