<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ececef"/>
    </linearGradient>
    <linearGradient id="balloon" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ff5b4d"/>
      <stop offset="1" stop-color="#d11a12"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- string -->
  <path d="M256 322 C 272 360 244 384 260 414 C 270 432 252 444 256 462"
        fill="none" stroke="#33333a" stroke-width="5" stroke-linecap="round"/>
  <!-- heart-shaped balloon -->
  <path d="M256 322 C 150 250 132 178 132 150 C 132 110 165 90 200 90
           C 230 90 250 112 256 140 C 262 112 282 90 312 90
           C 347 90 380 110 380 150 C 380 178 362 250 256 322 Z"
        fill="url(#balloon)"/>
  <!-- knot -->
  <path d="M248 318 L264 318 L256 336 Z" fill="#c2150e"/>
  <!-- highlight -->
  <ellipse cx="200" cy="150" rx="34" ry="22" fill="#ffffff" opacity="0.28" transform="rotate(-32 200 150)"/>
</svg>
